[[items]]
title = "The Ordinary 消费者语义差距分析"
subtitle = "硕士项目 · 核心分析师"
date = "2026"
content = """
- 抓取并清洗 Sephora 平台 35,934 条用户评论，构建可分析文本数据集。
- 利用 Sentence Transformer 量化品牌官方卖点与用户真实感知之间的语义差距（Semantic Gap）。
- 使用 BERTopic 识别高影响力负面主题，定位“搓泥”“爆痘”等核心痛点。
- 输出含可视化的策略报告，为内容侧重点与 KOL 投放方向提供数据支持。
"""
tags = ["市场研究", "文本挖掘", "消费者洞察"]

